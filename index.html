<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farewell Sylvain 💙</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Caveat', cursive; background: linear-gradient(160deg, #F0F4FF 0%, #EEF3FF 60%, #DDEAFF 100%); min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FIREBASE_URL = "https://sylvain-farewell-default-rtdb.europe-west1.firebasedatabase.app";
    const PHOTO_URL = "Sylvain-Grande.jpg";
    const ADMIN_HASH = "ec6ccda221d72e405f55250d7f3e54487145e741a74d00b0831397fd7d6b7e0b";

    const PAYFIT_BLUE = "#0B5FFF";
    const PAYFIT_DARK = "#001450";
    const ROTATIONS = [-4, -2, -1, 1.5, 2.5, -3, 3, -1.5, 2, -2.5];

    async function verifyPassword(input) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
      return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,'0')).join('') === ADMIN_HASH;
    }

    function Pin() {
      return (
        <div style={{ position: "absolute", top: "-13px", left: "50%", transform: "translateX(-50%)", zIndex: 2, display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style={{
            width: "22px", height: "22px", borderRadius: "50%",
            background: "radial-gradient(circle at 35% 30%, #5B9BFF, #0B3FCC)",
            boxShadow: "0 3px 8px rgba(0,0,0,0.35), inset 0 1px 3px rgba(255,255,255,0.45)"
          }} />
          <div style={{ width: "3px", height: "8px", background: "rgba(0,0,0,0.25)", borderRadius: "0 0 2px 2px", marginTop: "-2px" }} />
        </div>
      );
    }

    function PolaroidCard({ msg, onClick, adminMode, onDelete }) {
      const [hovered, setHovered] = useState(false);
      const truncated = msg.text && msg.text.length > 80 ? msg.text.slice(0, 80) + "..." : msg.text;
      return (
        <div style={{ position: "relative", display: "inline-block", width: "100%", marginBottom: "32px", breakInside: "avoid" }}>
          <div
            onClick={onClick}
            onMouseEnter={() => setHovered(true)}
            onMouseLeave={() => setHovered(false)}
            style={{
              background: "white",
              padding: "10px 10px 0",
              boxShadow: hovered ? "6px 10px 28px rgba(0,0,0,0.22)" : "3px 6px 16px rgba(0,0,0,0.14)",
              transform: hovered ? "rotate(0deg) scale(1.03)" : "rotate(" + msg.rotation + "deg)",
              transition: "transform 0.2s, box-shadow 0.2s",
              cursor: "pointer",
              position: "relative"
            }}
          >
            <Pin />
            <img src={msg.photo} alt="photo" style={{ width: "100%", height: "200px", objectFit: "cover", display: "block" }} />
            <div style={{ padding: "10px 6px 14px", fontFamily: "Caveat, cursive" }}>
              {msg.text && <p style={{ fontSize: "17px", color: "#333", lineHeight: "1.4", marginBottom: "8px" }}>{truncated}</p>}
              <p style={{ fontSize: "15px", color: PAYFIT_BLUE, fontWeight: 600, textAlign: "right" }}>— {msg.sender}</p>
            </div>
          </div>
          {adminMode && (
            <button onClick={e => { e.stopPropagation(); onDelete(msg.id); }} style={{ position: "absolute", top: "-6px", right: "-6px", background: "#EF4444", border: "none", borderRadius: "50%", width: "26px", height: "26px", cursor: "pointer", color: "white", fontSize: "13px", zIndex: 10, boxShadow: "0 2px 6px rgba(239,68,68,0.5)" }}>🗑</button>
          )}
        </div>
      );
    }

    function PaperCard({ msg, onClick, adminMode, onDelete }) {
      const [hovered, setHovered] = useState(false);
      const truncated = msg.text && msg.text.length > 120 ? msg.text.slice(0, 120) + "..." : msg.text;
      return (
        <div style={{ position: "relative", display: "inline-block", width: "100%", marginBottom: "32px", breakInside: "avoid" }}>
          <div
            onClick={onClick}
            onMouseEnter={() => setHovered(true)}
            onMouseLeave={() => setHovered(false)}
            style={{
              background: "#FEFEFE",
              padding: "28px 20px 20px",
              boxShadow: hovered ? "6px 10px 28px rgba(0,0,0,0.18)" : "3px 6px 16px rgba(0,0,0,0.1)",
              transform: hovered ? "rotate(0deg) scale(1.03)" : "rotate(" + msg.rotation + "deg)",
              transition: "transform 0.2s, box-shadow 0.2s",
              cursor: "pointer",
              position: "relative",
              minHeight: "160px"
            }}
          >
            <Pin />
            <p style={{ fontSize: "20px", color: "#2c2c2c", lineHeight: "1.55", marginBottom: "16px", fontFamily: "Caveat, cursive" }}>{truncated}</p>
            <p style={{ fontSize: "16px", color: PAYFIT_BLUE, fontWeight: 600, textAlign: "right", fontFamily: "Caveat, cursive" }}>— {msg.sender}</p>
          </div>
          {adminMode && (
            <button onClick={e => { e.stopPropagation(); onDelete(msg.id); }} style={{ position: "absolute", top: "-6px", right: "-6px", background: "#EF4444", border: "none", borderRadius: "50%", width: "26px", height: "26px", cursor: "pointer", color: "white", fontSize: "13px", zIndex: 10, boxShadow: "0 2px 6px rgba(239,68,68,0.5)" }}>🗑</button>
          )}
        </div>
      );
    }

    function Modal({ msg, onClose }) {
      if (!msg) return null;
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(4px)", padding: "24px" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "white", maxWidth: "520px", width: "100%", maxHeight: "90vh", overflowY: "auto", borderRadius: "4px", boxShadow: "0 24px 64px rgba(0,0,0,0.35)", position: "relative" }}>
            <button onClick={onClose} style={{ position: "absolute", top: "12px", right: "14px", background: "transparent", border: "none", fontSize: "22px", cursor: "pointer", color: "#999", zIndex: 10 }}>✕</button>
            {msg.photo && (
              <div style={{ padding: "16px 16px 0" }}>
                <img src={msg.photo} alt="photo" style={{ width: "100%", maxHeight: "400px", objectFit: "cover", display: "block" }} />
              </div>
            )}
            <div style={{ padding: "24px 28px 28px" }}>
              {msg.text && <p style={{ fontSize: "22px", lineHeight: "1.6", color: "#2c2c2c", fontFamily: "Caveat, cursive", marginBottom: "20px", whiteSpace: "pre-wrap" }}>{msg.text}</p>}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "1px solid #eee", paddingTop: "14px" }}>
                <p style={{ fontFamily: "Caveat, cursive", fontWeight: 700, color: PAYFIT_BLUE, fontSize: "18px" }}>— {msg.sender}</p>
                <p style={{ fontSize: "13px", color: "#aaa", fontFamily: "sans-serif" }}>{msg.date}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function KudosBoard() {
      const [messages, setMessages] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [sender, setSender] = useState("");
      const [text, setText] = useState("");
      const [error, setError] = useState("");
      const [lightboxMsg, setLightboxMsg] = useState(null);
      const [uploadedPhoto, setUploadedPhoto] = useState(null);
      const [loading, setLoading] = useState(true);
      const [posting, setPosting] = useState(false);
      const [online, setOnline] = useState(true);
      const [adminMode, setAdminMode] = useState(false);
      const fileInputRef = useRef(null);
      const footerClickCount = useRef(0);
      const footerClickTimer = useRef(null);

      const fetchMessages = async () => {
        try {
          const res = await fetch(FIREBASE_URL + "/kudos.json");
          const data = await res.json();
          if (data && typeof data === "object") {
            const loaded = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            loaded.sort((a, b) => b.id.localeCompare(a.id));
            setMessages(loaded);
          } else { setMessages([]); }
          setOnline(true);
        } catch { setOnline(false); }
        finally { setLoading(false); }
      };

      useEffect(() => {
        fetchMessages();
        const interval = setInterval(fetchMessages, 10000);
        return () => clearInterval(interval);
      }, []);

      const handleFooterClick = () => {
        footerClickCount.current += 1;
        if (footerClickTimer.current) clearTimeout(footerClickTimer.current);
        footerClickTimer.current = setTimeout(() => { footerClickCount.current = 0; }, 800);
        if (footerClickCount.current >= 3) {
          footerClickCount.current = 0;
          if (adminMode) { setAdminMode(false); return; }
          const pwd = window.prompt("🔐 Admin password:");
          if (pwd === null) return;
          verifyPassword(pwd).then(ok => {
            if (ok) { setAdminMode(true); window.alert("✅ Admin mode activated."); }
            else { window.alert("❌ Wrong password."); }
          });
        }
      };

      const handleDelete = async (id) => {
        if (!window.confirm("Delete this message?")) return;
        try {
          await fetch(FIREBASE_URL + "/kudos/" + id + ".json", { method: "DELETE" });
          setMessages(prev => prev.filter(m => m.id !== id));
        } catch { window.alert("Failed to delete."); }
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => setUploadedPhoto(ev.target.result);
        reader.readAsDataURL(file);
      };

      const handleAdd = async () => {
        if (!sender.trim()) { setError("Please enter your name."); return; }
        if (!text.trim() && !uploadedPhoto) { setError("Please write a message or add a photo."); return; }
        const date = new Date().toLocaleDateString("en-GB", { month: "long", year: "numeric" });
        const rotation = ROTATIONS[Math.floor(Math.random() * ROTATIONS.length)];
        const payload = { sender: sender.trim(), text: text.trim(), rotation, date, ...(uploadedPhoto ? { photo: uploadedPhoto } : {}) };
        setPosting(true);
        try {
          const res = await fetch(FIREBASE_URL + "/kudos.json", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          const data = await res.json();
          setMessages(prev => [{ id: data.name, ...payload }, ...prev]);
          setSender(""); setText(""); setUploadedPhoto(null); setError(""); setShowForm(false);
          if (fileInputRef.current) fileInputRef.current.value = "";
        } catch { setError("Failed to post. Please try again."); }
        finally { setPosting(false); }
      };

      const handleCancel = () => { setSender(""); setText(""); setUploadedPhoto(null); setError(""); setShowForm(false); if (fileInputRef.current) fileInputRef.current.value = ""; };

      return (
        <div style={{ background: "linear-gradient(160deg,#F0F4FF 0%,#EEF3FF 60%,#DDEAFF 100%)", minHeight: "100vh", padding: "32px 24px 80px" }}>

          {/* Admin bar */}
          {adminMode && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
              <span style={{ fontSize: "13px", background: "#FEF3C7", color: "#92400E", padding: "4px 12px", borderRadius: "20px", fontWeight: 600, fontFamily: "sans-serif" }}>🔐 Admin mode — click 🗑 to delete</span>
              <span style={{ fontSize: "13px", color: online ? "#16A34A" : "#DC2626", fontWeight: 600, fontFamily: "sans-serif" }}>{online ? "🟢 Live" : "🔴 Connection error"}</span>
            </div>
          )}

          {/* Header */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: "44px" }}>
            <div style={{ background: "white", padding: "10px 10px 0", boxShadow: "0 8px 32px rgba(11,95,255,0.15)", transform: "rotate(-1.5deg)", marginBottom: "24px", display: "inline-block", width: "180px", position: "relative" }}>
              <Pin />
              {PHOTO_URL ? <img src={PHOTO_URL} alt="Sylvain" style={{ width: "160px", height: "160px", objectFit: "cover", display: "block" }} /> : <div style={{ width: "160px", height: "160px", background: "linear-gradient(135deg,#0B5FFF,#5B9BFF)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "48px", fontWeight: 800, color: "white", fontFamily: "sans-serif" }}>SG</div>}
              <div style={{ height: "48px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <p style={{ fontFamily: "Caveat, cursive", fontStyle: "italic", color: PAYFIT_BLUE, fontSize: "16px" }}>Thanks for everything 🙌🏻</p>
              </div>
            </div>
            <h1 style={{ fontSize: "clamp(26px,5vw,44px)", fontWeight: 800, color: PAYFIT_DARK, letterSpacing: "-1px", textAlign: "center", lineHeight: 1.1, fontFamily: "sans-serif" }}>Farewell, <span style={{ color: PAYFIT_BLUE }}>Sylvain Grande</span> 💙</h1>
            <p style={{ color: "#9CA3AF", fontSize: "14px", marginTop: "8px", fontStyle: "italic", textAlign: "center", fontFamily: "sans-serif" }}>Leave a note to celebrate his incredible journey</p>
          </div>

          {/* Floating button */}
          {!showForm && (
            <button onClick={() => setShowForm(true)} style={{ position: "fixed", bottom: "32px", right: "32px", background: PAYFIT_BLUE, color: "white", padding: "14px 24px", borderRadius: "50px", fontSize: "16px", fontWeight: 600, boxShadow: "0 6px 20px rgba(11,95,255,0.45)", border: "none", cursor: "pointer", fontFamily: "sans-serif", zIndex: 100, display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "20px" }}>+</span> Leave a message
            </button>
          )}

          {/* Form */}
          {showForm && (
            <div style={{ maxWidth: "480px", margin: "0 auto 48px", background: "#FEFEFE", padding: "32px 28px 24px", boxShadow: "4px 6px 20px rgba(0,0,0,0.12)", position: "relative", transform: "rotate(-0.5deg)" }}>
              <Pin />
              <button onClick={handleCancel} style={{ position: "absolute", top: "12px", right: "14px", background: "transparent", border: "none", cursor: "pointer", color: "#9CA3AF", fontSize: "20px" }}>✕</button>
              <input placeholder="Your name" value={sender} onChange={e => setSender(e.target.value)} style={{ width: "100%", border: "none", borderBottom: "2px solid rgba(11,95,255,0.2)", background: "transparent", fontSize: "22px", fontWeight: 600, padding: "4px 0 8px", marginBottom: "16px", outline: "none", color: PAYFIT_DARK, fontFamily: "Caveat, cursive", boxSizing: "border-box" }} />
              <textarea placeholder="Write your message to Sylvain..." value={text} onChange={e => setText(e.target.value)} rows={4} style={{ width: "100%", border: "none", background: "transparent", fontSize: "20px", outline: "none", resize: "none", color: "#374151", lineHeight: "1.6", fontFamily: "Caveat, cursive", boxSizing: "border-box" }} />
              <div style={{ marginTop: "16px" }}>
                <input ref={fileInputRef} type="file" accept="image/*" onChange={handlePhotoUpload} style={{ display: "none" }} id="photo-upload" />
                {uploadedPhoto ? (
                  <div style={{ position: "relative", display: "inline-block" }}>
                    <img src={uploadedPhoto} alt="preview" style={{ width: "80px", height: "80px", objectFit: "cover", border: "3px solid white", boxShadow: "2px 2px 8px rgba(0,0,0,0.15)" }} />
                    <button onClick={() => { setUploadedPhoto(null); if (fileInputRef.current) fileInputRef.current.value = ""; }} style={{ position: "absolute", top: "-8px", right: "-8px", background: "#EF4444", border: "none", borderRadius: "50%", width: "20px", height: "20px", cursor: "pointer", color: "white", fontSize: "12px" }}>✕</button>
                  </div>
                ) : (
                  <label htmlFor="photo-upload" style={{ display: "inline-flex", alignItems: "center", gap: "6px", cursor: "pointer", fontSize: "15px", color: PAYFIT_BLUE, fontWeight: 600, padding: "6px 12px", borderRadius: "6px", border: "1.5px dashed " + PAYFIT_BLUE, fontFamily: "sans-serif" }}>📷 Add a photo</label>
                )}
              </div>
              {error && <p style={{ color: "#EF4444", fontSize: "14px", marginTop: "8px", fontFamily: "sans-serif" }}>{error}</p>}
              <div style={{ display: "flex", gap: "10px", justifyContent: "flex-end", marginTop: "20px", borderTop: "1px solid rgba(0,0,0,0.07)", paddingTop: "16px" }}>
                <button onClick={handleCancel} style={{ padding: "8px 16px", borderRadius: "8px", border: "1px solid #e5e7eb", background: "white", cursor: "pointer", fontFamily: "sans-serif" }}>Cancel</button>
                <button onClick={handleAdd} disabled={posting} style={{ background: PAYFIT_BLUE, color: "white", padding: "8px 20px", borderRadius: "8px", fontWeight: 600, border: "none", cursor: posting ? "not-allowed" : "pointer", fontFamily: "sans-serif", opacity: posting ? 0.7 : 1 }}>{posting ? "Posting..." : "📌 Post it!"}</button>
              </div>
            </div>
          )}

          {/* Messages */}
          {loading ? (
            <p style={{ textAlign: "center", color: "#888", fontFamily: "sans-serif", marginTop: "40px" }}>Loading messages...</p>
          ) : messages.length === 0 && !showForm ? (
            <p style={{ textAlign: "center", color: "#9CA3AF", fontSize: "18px", fontStyle: "italic", marginTop: "24px", fontFamily: "Caveat, cursive" }}>Be the first to leave a message for Sylvain! 🚀</p>
          ) : (
            <div style={{ columns: "3 260px", gap: "32px", maxWidth: "1100px", margin: "0 auto" }}>
              {messages.map(msg =>
                msg.photo
                  ? <PolaroidCard key={msg.id} msg={msg} onClick={() => setLightboxMsg(msg)} adminMode={adminMode} onDelete={handleDelete} />
                  : <PaperCard key={msg.id} msg={msg} onClick={() => setLightboxMsg(msg)} adminMode={adminMode} onDelete={handleDelete} />
              )}
            </div>
          )}

          <p onClick={handleFooterClick} style={{ textAlign: "center", color: "#B8B0A4", fontSize: "13px", marginTop: "48px", cursor: "default", userSelect: "none", fontFamily: "sans-serif" }}>Made with 💙 by the PayFit team</p>

          <Modal msg={lightboxMsg} onClose={() => setLightboxMsg(null)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KudosBoard));
  </script>
</body>
</html>
